<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="css/style.css" rel="stylesheet" />
    <title>Home</title>
  </head>

  <body>
    <div class="wrapper">
      <div>
        <header>
          <div class="header-bg">
            <h1>
              <span class="light-font-color-m">Ech</span
              ><span class="light-font-color-s">oV<span class="e">e</span></span
              ><span class="light-font-color-xs">rse</span>
            </h1>
            <nav class="nav-bar">
              <ul>
                <li><a href="index.html">Hem</a></li>
                <li><a href="musicgroups.html">Musikgrupper</a></li>
              </ul>
            </nav>
          </div>
        </header>
      </div>
      <div>
        <main>
          <h2>Lägg till musikgrupp</h2>
          <p>Här kan du lägga till en musikgrupp till listan.</p>
          <div class="div-form">
            <form id="add-group-form">
              <div class="div-input">
                <label class="label">Namn</label>
                <input class="input-item add-item" id="group-name" type="text" /><br />
              </div>
              <div class="div-input">
                <!-- Checkbox for genres-->
                <label class="label">Genre</label>
                <select class="input-item add-item" id="group-genre">
                  <option value="">Välj genre</option>
                  <option value="0">Rock</option>
                  <option value="1">Blues</option>
                  <option value="2">Jazz</option>
                  <option value="3">Metal</option></select
                ><br />
              </div>
              <div class="div-input">
                <label class="label">Etableringsår</label>
                <input class="input-item add-item" id="group-year" type="text" /><br />
              </div>
              <div>
                <button class="add-to-list-button" id="add-btn" type="submit">Lägg till</button>
              </div>
            </form>
          </div>
        </main>
      </div>
      <div>
        <footer class="div-flex-sb">
          <p>&copy; 2026, EchoV<span class="e">e</span>rse</p>
          <p>Lena Johnsson</p>
        </footer>
      </div>
    </div>
    <script src="js/add-group.js" type="module"></script>
  </body>
</html>
