<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="css/style.css" rel="stylesheet" />
    <title>Musikgrupper</title>
  </head>

  <body>
    <div class="wrapper">
      <div>
        <header>
          <div class="header-bg">
            <h1>
              <span class="light-font-color-m">Ech</span
              ><span class="light-font-color-s">oV<span class="e">e</span></span
              ><span class="light-font-color-xs">rse</span>
            </h1>
            <nav class="nav-bar">
              <ul>
                <li><a href="index.html">Hem</a></li>
                <li><a href="musicgroups.html">Musikgrupper</a></li>
              </ul>
            </nav>
          </div>
        </header>
      </div>

      <div>
        <main>
          <div class="div-flex-sb div-flex-media">
            <h2>Musikgrupper</h2>

            <!-- SEARCHBAR WITH A BUTTON -->
            <div>
              <div class="align-center">
                <form id="search-form">
                  <input
                    class="input-item"
                    id="input-txt"
                    type="text"
                    placeholder="Sök musikgrupp"
                  />
                  <button class="search-button" id="search-btn" type="submit">Sök</button>
                </form>
              </div>
              <p class="search-result" id="search-result"></p>
              <!-- A BUTTON TO ADD NEW GROUPS -->
              <div>
                <a href="addgroup.html"
                  ><button class="add-group-button">Lägg till musikgrupp</button></a
                >
              </div>
            </div>
          </div>
          <!-- CHECKBOX FOR FILTERING -->
          <div>
            <input class="check-box" id="check-box" type="checkbox" name="seeded" checked />
            <label for="check-box">Visa endast seedade grupper</label>
          </div>
          <!-- LIST WITH MUSIC GROUPS -->
          <ul class="music-list" id="music-list"></ul>

          <!-- PAGINATION BUTTONS -->
          <div class="buttons">
            <button class="page-button" id="prev-btn">Previous</button>
            <div class="page-buttons" id="page-btn"></div>
            <button class="page-button" id="next-btn">Next</button>
          </div>
        </main>
      </div>

      <div>
        <footer class="div-flex-sb">
          <p>&copy; 2026, EchoV<span class="e">e</span>rse</p>
          <div class="name-tag">
            <p>Lena Johnsson</p>
          </div>
        </footer>
      </div>
    </div>
    <script src="js/music-groups.js" type="module"></script>
  </body>
</html>
